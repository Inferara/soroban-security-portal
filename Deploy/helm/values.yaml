global:
  app:
    name: sorobansecurityportal
    build: 3
    domain: ""
    logLevel: Information
  containerRegistry:
    dockerConfig: ""
    name: docker.io/georgii4inferara
    imagePullPolicy: Always
  environment:
    namespace: sorobansecurityportal-ns
    name: sorobansecurityportal
  sorobansecurityportal:
    service:
      tag: "latest"
  redis:
    user: ""
    password: ""
  google:
    clientId: ""
    clientSecret: ""
  discord:
    clientId: ""
    clientSecret: ""
  postgres:
    storageClassName: "local-path"
    storageSize: 5Gi
    dbName: ""
    userName: ""
    password: ""
  embedding:
    model: "gemini-embedding-001"
    key: ""
  devtools:
    # Dev Tools backend (soroban-ret-web) configuration.
    mainnetRpc: "https://soroban-rpc.mainnet.stellar.gateway.fm"
    testnetRpc: "https://soroban-testnet.stellar.org"
    sorobanSdkVersion: "22.0.8"
    # Compile runs arbitrary user Rust on the server — off by default. Only
    # enable (--set global.devtools.noCompile=false) once it's sandboxed
    # (read-only/empty-root FS, no network, resource caps) and/or behind auth.
    noCompile: "true"
    # Compilation is CPU/RAM heavy; cap it so a build can't starve the node.
    # Node is a single 1-CPU box. With ~700m already requested by other pods,
    # leave room for this one with a modest request (it can still burst to the
    # limit when the core is free). See the Recreate strategy in the deployment.
    resources:
      requests:
        cpu: "150m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"
  letsEncryptIssuer: ""
  secrets:
    # API key for the zai-coding-plan OpenCode provider.
    # Supply at deploy time via --set global.secrets.zaiCodingPlanKey=<key>
    # NEVER commit a real key here.
    zaiCodingPlanKey: ""
