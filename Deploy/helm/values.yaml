global:
  app:
    name: sorobansecurityportal
    build: 3
    domain: ""
    logLevel: Information
  containerRegistry:
    dockerConfig: ""
    name: docker.io/georgii4inferara
    imagePullPolicy: Always
  environment:
    namespace: sorobansecurityportal-ns
    name: sorobansecurityportal
  sorobansecurityportal:
    service:
      tag: "latest"
  redis:
    user: ""
    password: ""
  google:
    clientId: ""
    clientSecret: ""
  discord:
    clientId: ""
    clientSecret: ""
  postgres:
    storageClassName: "local-path"
    storageSize: 5Gi
    dbName: ""
    userName: ""
    password: ""
  embedding:
    model: "gemini-embedding-001"
    key: ""
  devtools:
    # Dev Tools backend (soroban-ret-web) configuration.
    mainnetRpc: "https://soroban-rpc.mainnet.stellar.gateway.fm"
    testnetRpc: "https://soroban-testnet.stellar.org"
    sorobanSdkVersion: "22.0.8"
    noCompile: "false"
    # Compilation is CPU/RAM heavy; cap it so a build can't starve the node.
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "2"
        memory: "2Gi"
  letsEncryptIssuer: ""
  secrets:
    # API key for the zai-coding-plan OpenCode provider.
    # Supply at deploy time via --set global.secrets.zaiCodingPlanKey=<key>
    # NEVER commit a real key here.
    zaiCodingPlanKey: ""
