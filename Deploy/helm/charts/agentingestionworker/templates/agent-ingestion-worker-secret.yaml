{{- if .Values.agentIngestionWorker.enabled }}
apiVersion: v1
kind: Secret
metadata:
  namespace: {{ .Values.global.environment.namespace }}
  name: "{{ .Values.global.environment.name }}-agent-ingestion-worker-secret"
  labels:
    app: "{{ .Values.global.app.name }}"
    env: "{{ .Values.global.environment.namespace }}"
type: Opaque
stringData:
  # JSON credential file consumed by the opencode CLI.
  # Format: {"<provider>":{"type":"api","key":"<api-key>"}}
  # Supply the real key at deploy time via:
  #   --set global.secrets.zaiCodingPlanKey=<key>
  # NEVER commit a real key into this file.
  auth.json: |
    {"zai-coding-plan":{"type":"api","key":"{{ .Values.global.secrets.zaiCodingPlanKey }}"}}
{{- end }}
