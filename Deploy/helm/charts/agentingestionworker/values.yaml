# Default values for the agent ingestion worker sub-chart.
# All values are overridable via --set at deploy time.

agentIngestionWorker:
  # Set to false to skip deploying the worker (useful on envs where
  # the background agent pipeline is not yet activated).
  enabled: true

  # Poll interval in seconds — how long the worker sleeps when the queue is empty.
  pollIntervalSeconds: "15"

  # Stall watchdog: kill opencode if it produces no output for this many seconds.
  # Hard cap: kill a single run after this many minutes. Generous defaults because
  # on a small/single-CPU node glm-5.1 can stay silent for many minutes while it
  # reasons/generates a long response between tool steps — too short a stall window
  # kills otherwise-healthy runs ("opencode made no progress (stalled)").
  stallSeconds: "1200"
  timeoutMinutes: "60"

  # opencode (bun/node) is resource-hungry; an undersized memory limit OOM-kills it mid-run.
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"
