apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  namespace: {{ .Values.global.environment.namespace }}
  name: "{{ .Values.global.environment.name }}-sorobansecurityportal-api-ingressroute"
spec:
  entryPoints:
  - websecure
  tls:
    secretName: "{{ .Values.global.environment.name }}-ingress-tls"
    domains:
    - main: {{ .Values.global.app.domain }}
      sans:
      - {{ .Values.global.app.domain }}
  routes:
  # SECURITY: /api/v1/agent-runs/internal/* endpoints are UNAUTHENTICATED and
  # are ONLY intended for in-cluster access by the agent-ingestion-worker pod.
  # They MUST NOT be publicly reachable. The negated PathPrefix below is a hard
  # release gate — do not remove or relax it without a security review.
  # The in-cluster worker reaches them via the ClusterIP Service directly,
  # bypassing this IngressRoute entirely.
  - kind: Rule
    match: Host(`{{ .Values.global.app.domain }}`) && PathPrefix(`/api`) && !PathPrefix(`/api/v1/agent-runs/internal`)
    services:
    - name: "{{ .Values.global.environment.name }}-sorobansecurityportal-api-ip"
      port: 8080
  - kind: Rule
    match: Host(`{{ .Values.global.app.domain }}`) && PathPrefix(`/file`)
    services:
    - name: "{{ .Values.global.environment.name }}-sorobansecurityportal-api-ip"
      port: 8080
  # SignalR notifications hub (/hubs/notifications). Traefik upgrades the
  # websocket automatically; the path just has to reach the API service.
  - kind: Rule
    match: Host(`{{ .Values.global.app.domain }}`) && PathPrefix(`/hubs`)
    services:
    - name: "{{ .Values.global.environment.name }}-sorobansecurityportal-api-ip"
      port: 8080