apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: {{ .Values.global.environment.namespace }}
  name: "{{ .Values.global.environment.name }}-sorobansecurityportal-api-ingress"
  annotations:
    cert-manager.io/cluster-issuer: "{{ .Values.global.environment.name }}-letsencrypt-issuer"
    acme.cert-manager.io/http01-edit-in-place: "true"
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - {{ .Values.global.app.domain }}
    secretName: "{{ .Values.global.environment.name }}-ingress-tls"
  rules:
  - host: "{{ .Values.global.app.domain }}"
    http:
      paths:
      # SECURITY: Block public access to internal agent-run endpoints.
      # /api/v1/agent-runs/internal/* is unauthenticated and MUST NOT be public.
      # The IngressRoute (Traefik CRD) is the primary enforcement point with a
      # negated PathPrefix rule. This Ingress is used by cert-manager for ACME
      # challenges only; Traefik routes real traffic via the IngressRoute above.
      # A more-specific path listed FIRST wins in Kubernetes longest-prefix matching,
      # sending /api/v1/agent-runs/internal/* to a non-existent service → 503,
      # which is safe (the worker uses the ClusterIP Service, not the Ingress).
      - path: /api/v1/agent-runs/internal
        pathType: Prefix
        backend:
          service:
            # Intentionally routes to a non-existent port on the API service.
            # Real traffic to this path is blocked by the IngressRoute exclusion.
            # This entry exists purely as a defence-in-depth backstop.
            name: "{{ .Values.global.environment.name }}-sorobansecurityportal-api-ip"
            port:
              number: 9999
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: "{{ .Values.global.environment.name }}-sorobansecurityportal-api-ip"
            port:
              number: 8080
      - path: /file
        pathType: Prefix
        backend:
          service:
            name: "{{ .Values.global.environment.name }}-sorobansecurityportal-api-ip"
            port:
              number: 8080
      # SignalR notifications hub (/hubs/notifications) — Traefik handles the websocket upgrade.
      - path: /hubs
        pathType: Prefix
        backend:
          service:
            name: "{{ .Values.global.environment.name }}-sorobansecurityportal-api-ip"
            port:
              number: 8080