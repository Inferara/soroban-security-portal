user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    # In-cluster API service (host:port). Substituted at container start by envsubst.
    upstream og_backend {
        server ${OG_API_UPSTREAM};
    }

    # Known social link-preview crawlers. These do not execute JavaScript, so the SPA's
    # client-side meta tags are invisible to them; they must be served server-rendered tags.
    map $http_user_agent $og_bot {
        default                                                 0;
        "~*(facebookexternalhit|Facebot|Twitterbot|LinkedInBot|Slackbot|Slack-ImgProxy|TelegramBot|Discordbot|WhatsApp|Pinterest|redditbot|Embedly|vkShare|SkypeUriPreview|nuzzel|Applebot|bingbot)" 1;
    }

    server {
        listen       80;
        listen  [::]:80;
        server_name  localhost;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Detail pages: social crawlers get server-rendered OpenGraph HTML from the API;
        # real users fall through to the SPA exactly as before.
        # rewrite-in-if (the one safe use of "if") sends bots to a dedicated proxy location,
        # avoiding the broken interaction between "if { proxy_pass }" and try_files.
        location ~ ^/(vulnerability|report)/([0-9]+)/?$ {
            set $og_type $1;
            set $og_id   $2;
            if ($og_bot) {
                rewrite ^ /__og last;
            }
            root   /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        location = /__og {
            internal;
            proxy_pass http://og_backend/api/v1/og/$og_type/$og_id;
        }

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html =404;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }

    }
}
