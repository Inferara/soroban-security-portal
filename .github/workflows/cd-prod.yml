name: Deploy Stellar Security Portal

on:
  workflow_dispatch:
    inputs:
      apiUrl:
        description: 'API URL'
        required: false
        default: 'https://stellarsecurityportal.com'
      hostName:
        description: 'Host name'
        required: false
        default: 'stellarsecurityportal.com'
      envName:
        description: 'Environment name'
        required: false
        default: 'prod'
      enableCompile:
        description: 'Enable the Dev Tools /compile endpoint (runs an unsandboxed Rust toolchain in the soroban-ret-web pod)'
        type: boolean
        required: false
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.3

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Write kubeconfig from secret
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      - name: Deploy via Helm
        env:
          HELM_EXPERIMENTAL_OCI: '1'
          API_URL: ${{ inputs.apiUrl }}
          HOST_NAME: ${{ inputs.hostName }}
          ENV_NAME: ${{ inputs.envName }}
          ENABLE_COMPILE: ${{ inputs.enableCompile }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER_NAME: ${{ secrets.POSTGRES_USER }}
          DB_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_USER: ${{ secrets.REDIS_USER }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GA_ID: ${{ secrets.GTAG }}
          LETSENCRYPT_ISSUER: ${{ secrets.LETSENCRYPT_ISSUER }}
          ZAI_CODING_PLAN_KEY: ${{ secrets.ZAI_CODING_PLAN_KEY }}
        run: |
          # Generate a timestamp for build
          buildNumber=$(date +'%y%m%d%H%M%S')
          echo "Deploying Soroban Security Portal (build $buildNumber)..."

          # The chart defaults the Dev Tools /compile endpoint OFF. Turn it on only
          # when this deploy was dispatched with enableCompile=true.
          if [ "$ENABLE_COMPILE" = "true" ]; then
            noCompile="false"
            echo "Dev Tools /compile endpoint: ENABLED"
          else
            noCompile="true"
            echo "Dev Tools /compile endpoint: disabled"
          fi

          helm upgrade sorobansecurityportal \
            oci://registry-1.docker.io/georgii4inferara/sorobansecurityportal \
            --devel \
            --namespace sorobansecurityportal-ns \
            --create-namespace \
            --install \
            --kubeconfig "$HOME/.kube/config" \
            --set global.app.build="$buildNumber" \
            --set global.app.domain="$HOST_NAME" \
            --set global.sorobansecurityportalui.apiUrl="$API_URL" \
            --set-string global.devtools.noCompile="$noCompile" \
            --set global.sorobansecurityportalui.gaId="$GA_ID" \
            --set global.environment.namespace=sorobansecurityportal-ns \
            --set global.environment.name="$ENV_NAME" \
            --set global.postgres.dbName="$DB_NAME" \
            --set global.postgres.userName="$DB_USER_NAME" \
            --set global.postgres.password="$DB_PASSWORD" \
            --set global.redis.user="$REDIS_USER" \
            --set global.redis.password="$REDIS_PASSWORD" \
            --set global.google.clientId="$GOOGLE_CLIENT_ID" \
            --set global.google.clientSecret="$GOOGLE_CLIENT_SECRET" \
            --set global.discord.clientId="$DISCORD_CLIENT_ID" \
            --set global.discord.clientSecret="$DISCORD_CLIENT_SECRET" \
            --set global.embedding.key="$GEMINI_API_KEY" \
            --set-string global.secrets.zaiCodingPlanKey="$ZAI_CODING_PLAN_KEY" \
            --set global.letsEncryptIssuer="$LETSENCRYPT_ISSUER"
