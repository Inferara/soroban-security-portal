name: PR Build

on:
  pull_request:
    branches:
      - '**'

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: UI

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: UI/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: ESLINT_USE_FLAT_CONFIG=false npm run lint

      - name: Run tests
        run: npm test -- --run

      - name: Run tests with coverage
        run: npm test -- --run --coverage --reporter=default --reporter=json --outputFile=coverage/test-results.json

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: UI/coverage/
          retention-days: 7

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore SorobanSecurityPortal.sln

      - name: Build
        run: dotnet build SorobanSecurityPortal.sln --no-restore

  test-devtools:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DevTools/soroban-ret-web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build
        run: cargo build --release --locked

      - name: Test
        run: cargo test --locked

  build-images:
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend, test-devtools]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.3

      - name: Build API image
        uses: docker/build-push-action@v3
        with:
          context: Backend
          file: Backend/Dockerfile
          push: false

      - name: Build UI image
        uses: docker/build-push-action@v3
        with:
          context: UI
          file: UI/Dockerfile
          push: false

      - name: Build Dev Tools (soroban-ret-web) image
        uses: docker/build-push-action@v3
        with:
          context: DevTools/soroban-ret-web
          file: DevTools/soroban-ret-web/Dockerfile
          push: false
          # Skip the slow SDK pre-warm for PR validation (the service warms on startup).
          build-args: |
            PREWARM=false

      - name: Build Dev Tools (soroban-ret-web) slim image
        uses: docker/build-push-action@v3
        with:
          context: DevTools/soroban-ret-web
          file: DevTools/soroban-ret-web/Dockerfile
          target: runtime-slim
          push: false
